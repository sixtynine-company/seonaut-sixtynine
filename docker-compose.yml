services:
  db:
    image: mysql:8.4
    container_name: "SEOnaut-db"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=seonaut
      - MYSQL_USER=seonaut
      - MYSQL_PASSWORD=seonaut
    networks:
      - seonaut_network

  app:
    build: .
    container_name: "SEOnaut-app"
    # The internal /api/v1 routes share this port. For internal-network-only access
    # (per the API design), do NOT publish this port publicly — instead reach the app
    # from a co-located service over the seonaut_network at http://SEOnaut-app:9000,
    # or bind to 127.0.0.1 (e.g. "127.0.0.1:9000:9000"). Left published here for local dev.
    ports:
      - "${SEONAUT_PORT:-9000}:9000"
    depends_on:
      - db
    command: sh -c "/bin/wait && /app/seonaut"
    environment:
      - WAIT_HOSTS=db:3306
      - WAIT_TIMEOUT=300
      - WAIT_SLEEP_INTERVAL=30
      - WAIT_HOST_CONNECT_TIMEOUT=30
      # Seonaut config overrides
      # - SEONAUT_SERVER_HOST=${SEONAUT_SERVER_HOST:-0.0.0.0}
      # - SEONAUT_SERVER_PORT=${SEONAUT_INTERNAL_PORT:-9000}
      # - SEONAUT_SERVER_URL=${SEONAUT_SERVER_URL:-http://localhost:${SEONAUT_PORT:-9000}}
      # - SEONAUT_DATABASE_SERVER=${SEONAUT_DB_SERVER:-db}
      # - SEONAUT_DATABASE_PORT=${SEONAUT_DB_PORT:-3306}
      # - SEONAUT_DATABASE_USER=${SEONAUT_DB_USER:-seonaut}
      # - SEONAUT_DATABASE_PASSWORD=${SEONAUT_DB_PASSWORD:-seonaut}
      # - SEONAUT_DATABASE_DATABASE=${SEONAUT_DB_NAME:-seonaut}
      # Internal crawl API (set a strong secret to enable it):
      # - SEONAUT_API_KEY=${SEONAUT_API_KEY:-}
      # - SEONAUT_API_MAX_CONCURRENT_CRAWLS=${SEONAUT_API_MAX_CONCURRENT_CRAWLS:-3}
      # - SEONAUT_API_FULL_CAP=${SEONAUT_API_FULL_CAP:-200}
      # - SEONAUT_API_DEFAULT_TIMEOUT_SECONDS=${SEONAUT_API_DEFAULT_TIMEOUT_SECONDS:-90}
    networks:
      - seonaut_network

networks:
  seonaut_network:
    driver: bridge
